<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EEF3F7">
<title>Próximo — Porto Metro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@100..125,400..800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Tokens ─────────────────────────────────────────────────────────
   Palette: Porto azulejo. Cool porcelain ground, cobalt ink, and the
   metro line colours as the only saturated things on the page.
   ------------------------------------------------------------------ */
:root {
  --porcelain:      #EEF3F7;
  --glaze:          #FFFFFF;
  --ink:            #16305C;
  --ink-soft:       #5B7BA6;
  --hairline:       #D4DFE9;
  --hairline-firm:  #B9CBDC;

  --r-sm: 6px;
  --r-md: 12px;
  --r-lg: 18px;

  --pad: 20px;

  --display: 'Archivo', system-ui, sans-serif;
  --body:    'IBM Plex Sans', system-ui, sans-serif;
  --data:    'IBM Plex Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  background: var(--porcelain);
  color: var(--ink);
  font-family: var(--body);
  -webkit-text-size-adjust: 100%;
}

body {
  max-width: 560px;
  margin-inline: auto;
  padding: 0 var(--pad) calc(48px + env(safe-area-inset-bottom));
}

:focus-visible {
  outline: 2px solid var(--ink);
  outline-offset: 3px;
  border-radius: var(--r-sm);
}

/* ── Masthead ───────────────────────────────────────────────────── */
.masthead {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: calc(18px + env(safe-area-inset-top)) 0 22px;
}

.masthead__mark {
  display: grid;
  place-items: center;
  width: 26px;
  height: 26px;
  border-radius: var(--r-sm);
  background: var(--ink);
  color: var(--porcelain);
  font-family: var(--display);
  font-weight: 800;
  font-size: 17px;
  line-height: 1;
  padding-bottom: 1px;
}

.masthead__title {
  margin: 0;
  font-family: var(--display);
  font-weight: 700;
  font-variation-settings: 'wdth' 115;
  font-size: 19px;
  letter-spacing: 0.02em;
}

.masthead__refresh {
  margin-left: auto;
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  border: 1px solid var(--hairline-firm);
  border-radius: 50%;
  background: transparent;
  color: var(--ink-soft);
  cursor: pointer;
}
.masthead__refresh svg {
  width: 16px;
  height: 16px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.masthead__refresh[data-spinning='true'] svg { animation: spin 700ms linear infinite; }

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Stop tabs ──────────────────────────────────────────────────── */
.stops {
  display: flex;
  gap: 6px;
  padding: 4px;
  background: var(--glaze);
  border: 1px solid var(--hairline);
  border-radius: var(--r-md);
}

.stops__tab {
  flex: 1;
  padding: 11px 8px;
  border: 0;
  border-radius: 8px;
  background: transparent;
  color: var(--ink-soft);
  font-family: var(--display);
  font-size: 14px;
  font-weight: 600;
  font-variation-settings: 'wdth' 108;
  cursor: pointer;
  transition: background 140ms, color 140ms;
}
.stops__tab[aria-selected='true'] {
  background: var(--ink);
  color: var(--glaze);
}

/* ── Signature: the direction picker as a line diagram ──────────── */
.picker { padding: 30px 0 26px; }

.picker__heading {
  margin: 0 0 22px;
  font-family: var(--body);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--ink-soft);
}

.picker__diagram {
  position: relative;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: start;
  column-gap: 10px;
}

/* the track: striped with every line colour that runs through this stop */
.track {
  grid-column: 1 / -1;
  grid-row: 1;
  height: 6px;
  margin-top: 17px;
  border-radius: 3px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.track__strand { flex: 1; }

/* the terminus buttons sit on top of the track */
.end {
  grid-row: 1;
  display: flex;
  flex-direction: column;
  gap: 9px;
  padding: 0;
  border: 0;
  background: transparent;
  cursor: pointer;
  z-index: 1;
}
.end--left  { grid-column: 1; align-items: flex-start; text-align: left; }
.end--right { grid-column: 3; align-items: flex-end;  text-align: right; }

.end__cap {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 3px solid var(--hairline-firm);
  background: var(--porcelain);
  display: grid;
  place-items: center;
  transition: border-color 160ms, background 160ms, transform 160ms;
}
.end__arrow {
  width: 15px;
  height: 15px;
  fill: none;
  stroke: var(--hairline-firm);
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: stroke 160ms;
}
.end--left .end__arrow { transform: rotate(180deg); }

.end__label {
  font-family: var(--display);
  font-size: 14px;
  font-weight: 600;
  font-variation-settings: 'wdth' 105;
  color: var(--ink-soft);
  transition: color 160ms;
  max-width: 11ch;
  line-height: 1.25;
}
.end__note {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--hairline-firm);
  margin-top: -6px;
}

.end[aria-pressed='true'] .end__cap {
  border-color: var(--ink);
  background: var(--ink);
  transform: scale(1.06);
}
.end[aria-pressed='true'] .end__arrow { stroke: var(--glaze); }
.end[aria-pressed='true'] .end__label { color: var(--ink); }
.end[aria-pressed='true'] .end__note  { color: var(--ink-soft); }

/* you are here */
.here {
  grid-row: 1;
  grid-column: 2;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
}
.here__dot {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 3px solid var(--ink);
  background: var(--glaze);
  display: grid;
  place-items: center;
}
.here__dot::after {
  content: '';
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--ink);
}
.here__label {
  font-family: var(--display);
  font-size: 13px;
  font-weight: 700;
  font-variation-settings: 'wdth' 105;
  white-space: nowrap;
}

/* ── Board ──────────────────────────────────────────────────────── */
.board { display: flex; flex-direction: column; gap: 8px; }

.board__loading,
.board__empty {
  padding: 34px 0;
  text-align: center;
  color: var(--ink-soft);
  font-size: 14px;
}
.board__empty strong {
  display: block;
  font-family: var(--display);
  font-size: 16px;
  color: var(--ink);
  margin-bottom: 6px;
}

/* line badge */
.badge {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--line, var(--ink));
  color: #fff;
  font-family: var(--display);
  font-weight: 700;
  font-size: 14px;
  line-height: 1;
  flex: none;
}
.badge--lg { width: 38px; height: 38px; font-size: 18px; }
.badge--onlight { color: #fff; }

/* next departure — the one you actually look at */
.next {
  position: relative;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 14px;
  padding: 22px 20px;
  background: var(--glaze);
  border: 1px solid var(--hairline);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.next::before {
  content: '';
  position: absolute;
  inset: 0 auto 0 0;
  width: 5px;
  background: var(--line, var(--ink));
}

.next__headsign {
  font-family: var(--display);
  font-size: 17px;
  font-weight: 600;
  font-variation-settings: 'wdth' 105;
  line-height: 1.2;
}
.next__time {
  font-family: var(--data);
  font-size: 12px;
  color: var(--ink-soft);
  margin-top: 3px;
}

.next__count {
  display: flex;
  align-items: baseline;
  gap: 3px;
}
.next__min {
  font-family: var(--display);
  font-size: 46px;
  font-weight: 700;
  font-variation-settings: 'wdth' 112;
  line-height: 0.9;
  font-variant-numeric: tabular-nums;
}
.next__unit {
  font-family: var(--body);
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-soft);
}
.next__due {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 700;
  font-variation-settings: 'wdth' 112;
  color: var(--line, var(--ink));
}

/* the rest */
.row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 14px;
  padding: 13px 20px;
  background: var(--glaze);
  border: 1px solid var(--hairline);
  border-radius: var(--r-md);
}
.row__headsign {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.2;
}
.row__time {
  font-family: var(--data);
  font-size: 11px;
  color: var(--ink-soft);
  margin-top: 2px;
}
.row__count {
  font-family: var(--data);
  font-size: 15px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.row__count span {
  font-size: 10px;
  font-weight: 400;
  color: var(--ink-soft);
  margin-left: 2px;
}

/* ── Stamp ──────────────────────────────────────────────────────── */
.stamp {
  margin: 20px 0 0;
  text-align: center;
  font-family: var(--data);
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--hairline-firm);
  text-transform: uppercase;
}

body[data-loading='true'] .board { opacity: 0.45; }
.board { transition: opacity 160ms; }

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

</style>
</head>
<body>

<header class="masthead">
  <span class="masthead__mark" aria-hidden="true">M</span>
  <h1 class="masthead__title">Próximo</h1>
  <button class="masthead__refresh" id="refresh" type="button" aria-label="Refresh now">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v5h-5"/></svg>
  </button>
</header>

<main>
  <nav class="stops" id="stops" aria-label="Choose stop"></nav>

  <section class="picker" aria-labelledby="picker-heading">
    <h2 class="picker__heading" id="picker-heading">Which way are you going?</h2>
    <div class="picker__diagram" id="diagram"></div>
  </section>

  <section class="board" id="board" aria-live="polite" aria-busy="true">
    <div class="board__loading">Loading times…</div>
  </section>

  <p class="stamp" id="stamp"></p>
</main>

<script type="module">
/*
 * data.js — stop configuration + MOCK departure generator.
 *
 * This is the seam. When the GTFS backend exists, `getDepartures()` becomes a
 * fetch() to /api/departures and everything else stays exactly as it is.
 *
 * ⚠ The line/terminus/headway values below are my best guess and are NOT
 *   authoritative. The GTFS import will overwrite all of it.
 */

const LINE_COLORS = {
  A: '#0072BC', // azul
  B: '#D6202A', // vermelha
  C: '#009A44', // verde
  D: '#F5C400', // amarela
  E: '#6E2B8B', // violeta
  F: '#F58220', // laranja
};

const STOPS = {
  viso: {
    id: 'viso',
    name: 'Viso',
    // Viso sits on the shared trunk between Casa da Música and Senhora da Hora.
    // Four lines run through it. (F terminates at Sra. da Hora, so it is not here.)
    lines: ['A', 'B', 'C', 'E'],
    directions: [
      {
        id: 'trindade',
        label: 'Trindade',
        note: 'city centre',
        headsigns: {
          A: 'Estádio do Dragão',
          B: 'Estádio do Dragão',
          C: 'Campanhã',
          E: 'Estádio do Dragão',
        },
      },
      {
        id: 'senhora_da_hora',
        label: 'Senhora da Hora',
        note: 'north',
        headsigns: {
          A: 'Senhor de Matosinhos',
          B: 'Póvoa de Varzim',
          C: 'Trofa',
          E: 'Aeroporto',
        },
      },
    ],
    headways: { A: 9, B: 11, C: 13, E: 21 },
  },

  forum_maia: {
    id: 'forum_maia',
    name: 'Fórum Maia',
    lines: ['C'],
    directions: [
      {
        id: 'campanha',
        label: 'Campanhã',
        note: 'city centre',
        headsigns: { C: 'Campanhã' },
      },
      {
        id: 'trofa',
        label: 'Trofa',
        note: 'north',
        headsigns: { C: 'Trofa' },
      },
    ],
    headways: { C: 13 },
  },
};

const SERVICE_START_MIN = 6 * 60; // 06:00
const SERVICE_END_MIN = 25 * 60; // 01:00 next day

/* Stable pseudo-random offset so a line's departures don't jump between polls. */
function seedOffset(key, headway) {
  let h = 0;
  for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) % 100000;
  return h % headway;
}

/**
 * Returns the same shape the real backend will return.
 * @returns {Promise<{stop_id, stop_name, direction_id, generated_at, realtime, departures: Array}>}
 */
async function getDepartures(stopId, directionId) {
  const stop = STOPS[stopId];
  const direction = stop.directions.find((d) => d.id === directionId);

  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
  const clock = now.getHours() < 2 ? nowMin + 24 * 60 : nowMin;

  const departures = [];

  if (clock >= SERVICE_START_MIN && clock <= SERVICE_END_MIN) {
    for (const line of stop.lines) {
      const headway = stop.headways[line];
      const offset = seedOffset(line + directionId, headway);
      let t = SERVICE_START_MIN + offset;
      while (t < clock) t += headway;
      for (let i = 0; i < 4 && t <= SERVICE_END_MIN && t - clock <= 60; i++) {
        departures.push({
          line,
          headsign: direction.headsigns[line],
          departure_time: minutesToClock(t),
          seconds_until: Math.round((t - clock) * 60),
          realtime: false,
        });
        t += headway;
      }
    }
  }

  departures.sort((a, b) => a.seconds_until - b.seconds_until);

  // Pretend the network exists.
  await new Promise((r) => setTimeout(r, 180));

  return {
    stop_id: stop.id,
    stop_name: stop.name,
    direction_id: direction.id,
    generated_at: now.toISOString(),
    realtime: false,
    departures: departures.slice(0, 8),
  };
}

function minutesToClock(total) {
  const m = Math.floor(total) % (24 * 60);
  return `${String(Math.floor(m / 60)).padStart(2, '0')}:${String(m % 60).padStart(2, '0')}`;
}




const fetchDepartures = getDepartures;

const REFETCH_MS = 60_000;
const TICK_MS = 5_000;

const el = {
  stops: document.getElementById('stops'),
  diagram: document.getElementById('diagram'),
  board: document.getElementById('board'),
  stamp: document.getElementById('stamp'),
  refresh: document.getElementById('refresh'),
};

const state = {
  stopId: null,
  directionId: null,
  payload: null,
  fetchedAt: null,
};

/* Remembering the last stop is the whole point of a phone bookmark.
   Guarded because storage can be unavailable (private mode, sandboxed frames). */
const remember = {
  read() {
    try { return JSON.parse(localStorage.getItem('proximo') || 'null'); }
    catch { return null; }
  },
  write(v) {
    try { localStorage.setItem('proximo', JSON.stringify(v)); }
    catch { /* fine */ }
  },
};

/* ── Selection ──────────────────────────────────────────────────── */

function selectStop(stopId, directionId) {
  const stop = STOPS[stopId];
  state.stopId = stopId;
  state.directionId = stop.directions.some((d) => d.id === directionId)
    ? directionId
    : stop.directions[0].id;

  remember.write({ stopId: state.stopId, directionId: state.directionId });
  renderStops();
  renderDiagram();
  load();
}

function selectDirection(directionId) {
  state.directionId = directionId;
  remember.write({ stopId: state.stopId, directionId });
  renderDiagram();
  load();
}

/* ── Render: stop tabs ──────────────────────────────────────────── */

function renderStops() {
  el.stops.replaceChildren(
    ...Object.values(STOPS).map((stop) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'stops__tab';
      b.textContent = stop.name;
      b.setAttribute('role', 'tab');
      b.setAttribute('aria-selected', String(stop.id === state.stopId));
      b.addEventListener('click', () => selectStop(stop.id, state.directionId));
      return b;
    })
  );
  el.stops.setAttribute('role', 'tablist');
}

/* ── Render: the line diagram ───────────────────────────────────── */

function renderDiagram() {
  const stop = STOPS[state.stopId];
  const [left, right] = stop.directions;

  const track = document.createElement('div');
  track.className = 'track';
  // One strand per line running through this stop — a shared trunk looks shared.
  for (const line of stop.lines) {
    const s = document.createElement('div');
    s.className = 'track__strand';
    s.style.background = LINE_COLORS[line];
    track.append(s);
  }

  const here = document.createElement('div');
  here.className = 'here';
  here.innerHTML = `<div class="here__dot"></div><div class="here__label">${stop.name}</div>`;

  el.diagram.replaceChildren(track, end(left, 'left'), here, end(right, 'right'));
}

function end(direction, side) {
  const b = document.createElement('button');
  b.type = 'button';
  b.className = `end end--${side}`;
  b.setAttribute('aria-pressed', String(direction.id === state.directionId));
  b.setAttribute('aria-label', `Show metros towards ${direction.label}`);
  b.innerHTML = `
    <span class="end__cap">
      <svg class="end__arrow" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 12h13M12 5l7 7-7 7"/>
      </svg>
    </span>
    <span class="end__label">${direction.label}</span>
    <span class="end__note">${direction.note}</span>`;
  b.addEventListener('click', () => selectDirection(direction.id));
  return b;
}

/* ── Render: the board ──────────────────────────────────────────── */

function renderBoard() {
  const { payload } = state;
  if (!payload) return;

  const live = payload.departures
    .map((d) => ({ ...d, seconds_left: secondsLeft(d) }))
    .filter((d) => d.seconds_left > -30);

  if (!live.length) {
    el.board.innerHTML =
      `<div class="board__empty"><strong>No metros right now</strong>Service runs about 06:00–01:00.</div>`;
    return;
  }

  const [first, ...rest] = live;
  el.board.replaceChildren(nextCard(first), ...rest.slice(0, 5).map(row));
}

function nextCard(d) {
  const div = document.createElement('article');
  div.className = 'next';
  div.style.setProperty('--line', LINE_COLORS[d.line]);
  const mins = Math.floor(d.seconds_left / 60);
  div.innerHTML = `
    <span class="badge badge--lg">${d.line}</span>
    <div>
      <div class="next__headsign">${d.headsign}</div>
      <div class="next__time">${d.departure_time}</div>
    </div>
    ${
      mins < 1
        ? `<div class="next__due">Due</div>`
        : `<div class="next__count"><span class="next__min">${mins}</span><span class="next__unit">min</span></div>`
    }`;
  return div;
}

function row(d) {
  const div = document.createElement('article');
  div.className = 'row';
  const mins = Math.max(0, Math.floor(d.seconds_left / 60));
  div.innerHTML = `
    <span class="badge" style="--line:${LINE_COLORS[d.line]}">${d.line}</span>
    <div>
      <div class="row__headsign">${d.headsign}</div>
      <div class="row__time">${d.departure_time}</div>
    </div>
    <div class="row__count">${mins}<span>min</span></div>`;
  return div;
}

function secondsLeft(d) {
  const elapsed = (Date.now() - state.fetchedAt) / 1000;
  return d.seconds_until - elapsed;
}

/* ── Load ───────────────────────────────────────────────────────── */

let inflight = 0;

async function load() {
  const token = ++inflight;
  document.body.dataset.loading = 'true';
  el.board.setAttribute('aria-busy', 'true');
  el.refresh.dataset.spinning = 'true';

  try {
    const payload = await fetchDepartures(state.stopId, state.directionId);
    if (token !== inflight) return; // a newer request won
    state.payload = payload;
    state.fetchedAt = Date.now();
    renderBoard();
    stamp();
  } catch (err) {
    console.error(err);
    el.board.innerHTML =
      `<div class="board__empty"><strong>Couldn't load times</strong>Check the connection and try refresh.</div>`;
  } finally {
    if (token === inflight) {
      document.body.dataset.loading = 'false';
      el.board.setAttribute('aria-busy', 'false');
      el.refresh.dataset.spinning = 'false';
    }
  }
}

function stamp() {
  if (!state.fetchedAt) return;
  const age = Math.round((Date.now() - state.fetchedAt) / 1000);
  const when = age < 10 ? 'just now' : `${age}s ago`;
  el.stamp.textContent = `Timetable · updated ${when}`;
}

/* ── Boot ───────────────────────────────────────────────────────── */

el.refresh.addEventListener('click', load);

setInterval(() => {
  renderBoard();
  stamp();
}, TICK_MS);

setInterval(load, REFETCH_MS);

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) load();
});

const saved = remember.read();
selectStop(
  saved && STOPS[saved.stopId] ? saved.stopId : 'viso',
  saved?.directionId
);

</script>
</body>
</html>
