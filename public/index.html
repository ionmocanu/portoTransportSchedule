<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#EEF3F7">
  <title>Próximo — Porto Metro</title>
  <link rel="icon" href="./images/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@100..125,400..800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="masthead">
    <span class="masthead__mark" aria-hidden="true">M</span>
    <h1 class="masthead__title">Próximo</h1>
    <div class="lang-switch" id="lang-switch" role="group" data-i18n-aria-label="lang.aria"></div>
    <button class="masthead__refresh" id="refresh" type="button" data-i18n-aria-label="masthead.refresh">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v5h-5" />
      </svg>
    </button>
  </header>

  <main>
    <div class="status-bar">
      <div class="status-bar__clock" id="clock-display">—</div>
      <div class="status-bar__holiday" id="holiday-warning" hidden>
        <strong data-i18n="holiday.title"></strong>
        <span data-i18n="holiday.body"></span>
      </div>
    </div>
    <div class="chooser">
      <button class="chooser__current" id="stop-button" type="button" aria-expanded="false" aria-controls="stop-panel">
        <span class="chooser__eyebrow" data-i18n="station.label">Station</span>
        <span class="chooser__name" id="stop-name">—</span>
        <svg class="chooser__chev" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 9l6 6 6-6" />
        </svg>
      </button>
      <div class="chooser__panel" id="stop-panel" hidden>
        <input class="chooser__search" id="stop-search" type="search" data-i18n-placeholder="station.search.placeholder"
          data-i18n-aria-label="station.search.aria" autocomplete="off" spellcheck="false">
        <button type="button" class="chooser__near" id="stop-near">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7Z" />
            <circle cx="12" cy="9" r="2.5" />
          </svg>
          <span class="chooser__nearlabel" data-i18n="station.near">Use my location</span>
        </button>
        <div class="chooser__recents" id="stop-recents"></div>
        <ul class="chooser__list" id="stop-list" role="listbox" data-i18n-aria-label="station.list.aria"></ul>
      </div>
    </div>

    <section class="picker" aria-labelledby="picker-heading">
      <h2 class="picker__heading" id="picker-heading" data-i18n="direction.heading">Direction</h2>
      <div class="picker__diagram" id="diagram"></div>
      <div class="line-filter" id="line-filter" hidden>
        <span class="line-filter__label" id="line-filter-label"></span>
        <button type="button" class="line-filter__clear" id="line-filter-clear" data-i18n="line.clear"></button>
      </div>
    </section>

    <div class="line-dots" id="line-dots" hidden></div>

    <section class="board" id="board" aria-live="polite" aria-busy="true">
      <div class="board__loading" data-i18n="board.loading">Loading times…</div>
    </section>

    <section class="planner" aria-labelledby="planner-heading">
      <h2 class="planner__heading" id="planner-heading" data-i18n="planner.heading">Trip planner</h2>
      <div class="planner__row">
        <select class="planner__select" id="planner-from" data-i18n-aria-label="planner.from.aria"></select>
        <button type="button" class="planner__swap" id="planner-swap" data-i18n-aria-label="planner.swap.aria">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 7h11m0 0-4-4m4 4-4 4M17 17H6m0 0 4 4m-4-4 4-4" />
          </svg>
        </button>
        <select class="planner__select" id="planner-to" data-i18n-aria-label="planner.to.aria"></select>
      </div>
      <div class="planner__result" id="planner-result"></div>
    </section>

    <p class="stamp" id="stamp"></p>
    <p class="stamp" id="feed-validity"></p>
  </main>

  <p class="disclaimer" id="disclaimer"></p>

  <footer class="footer">Made by KariboH</footer>

  <nav class="tabbar" id="tabbar" role="tablist">
    <button class="tab" type="button" role="tab" data-mode="metro" aria-selected="true" data-i18n-aria-label="tab.metro">
      <img class="tab__img" src="./images/METRO.svg" alt="">
    </button>
    <button class="tab" type="button" role="tab" data-mode="cp" aria-selected="false" data-i18n-aria-label="tab.cp">
      <img class="tab__img" src="./images/CP.svg" alt="">
    </button>
    <button class="tab" type="button" role="tab" data-mode="stcp" aria-selected="false" data-i18n-aria-label="tab.stcp">
      <img class="tab__img" src="./images/STCP.svg" alt="">
    </button>
  </nav>

  <script type="module" src="app.js"></script>
</body>

</html>
